<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Günlük İngilizce Kartları</title>
<style>
  :root {
    --teal-deep: #1F4B4B;
    --teal-mid: #2E6B67;
    --mustard: #D9A441;
    --paper: #EDEAE1;
    --ink: #23302E;
    --card-back: #F7F4EC;
    --morning: #D9A441;
    --afternoon: #C1622E;
    --evening: #4A5A8A;
    --night: #2E3550;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    font-family: 'Georgia', 'Times New Roman', serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header .eyebrow {
    font-family: 'Courier New', monospace;
    letter-spacing: 3px;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--teal-mid);
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 28px;
    margin: 0 0 4px;
    color: var(--teal-deep);
    font-weight: 700;
  }

  .header p {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #6b6558;
    margin: 0;
  }

  /* Genel ilerleme çubuğu */
  .overall-wrap {
    max-width: 420px;
    margin: 0 auto 20px;
  }

  .overall-progress {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--teal-deep);
    text-align: center;
    margin-bottom: 6px;
  }

  .overall-bar {
    height: 6px;
    border-radius: 4px;
    background: rgba(31,75,75,0.12);
    overflow: hidden;
  }

  .overall-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--teal-deep);
    transition: width 0.3s ease;
  }

  .progress {
    font-family: Arial, sans-serif;
    text-align: center;
    font-size: 12px;
    color: var(--teal-mid);
    margin-bottom: 16px;
  }

  .tabs {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 8px;
    padding: 2px 4px 10px;
    scroll-snap-type: x proximity;
  }

  .tabs::-webkit-scrollbar {
    height: 4px;
  }
  .tabs::-webkit-scrollbar-thumb {
    background: rgba(31,75,75,0.2);
    border-radius: 4px;
  }

  .tab-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    scroll-snap-align: center;
  }

  .tab {
    font-family: Arial, sans-serif;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--teal-mid);
    background: transparent;
    color: var(--teal-deep);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--teal-deep);
    color: white;
    border-color: var(--teal-deep);
  }

  .tab-badge {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #8a8578;
    white-space: nowrap;
  }

  .tabs-hint {
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #b0aa9a;
    text-align: center;
    margin-bottom: 16px;
  }

  /* Karıştır / filtre butonları */
  .toolbar {
    max-width: 420px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tool-btn {
    font-family: Arial, sans-serif;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--teal-mid);
    background: white;
    color: var(--teal-mid);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tool-btn.active {
    background: var(--teal-mid);
    color: white;
  }

  .deck {
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    height: 280px;
  }

  .card {
    position: absolute;
    inset: 0;
    perspective: 1200px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
    cursor: pointer;
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(31,75,75,0.18);
    border: 1px solid rgba(31,75,75,0.15);
  }

  .face-front {
    background: var(--card-back);
  }

  .face-back {
    background: var(--teal-deep);
    color: white;
    transform: rotateY(180deg);
  }

  .time-tag {
    font-family: Arial, sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 14px;
  }

  .learned-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #2E6B67;
    background: rgba(46,107,103,0.12);
    padding: 3px 8px;
    border-radius: 10px;
  }

  .word-en {
    font-size: 26px;
    font-weight: 700;
    color: var(--teal-deep);
    margin-bottom: 10px;
  }

  .sentence-en {
    font-family: Arial, sans-serif;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.5;
  }

  .word-tr {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .sentence-tr {
    font-family: Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    opacity: 0.95;
    margin-bottom: 16px;
  }

  .learn-btn {
    font-family: Arial, sans-serif;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.6);
    background: transparent;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
  }

  .learn-btn.is-learned {
    background: rgba(255,255,255,0.9);
    color: var(--teal-deep);
    border-color: transparent;
  }

  .hint {
    font-family: Arial, sans-serif;
    font-size: 11px;
    color: #999;
    position: absolute;
    bottom: 10px;
  }

  .empty-state {
    font-family: Arial, sans-serif;
    text-align: center;
    font-size: 15px;
    color: var(--teal-deep);
    padding: 40px 20px;
    line-height: 1.6;
  }

  .empty-sub {
    font-size: 12px;
    color: #8a8578;
  }

  .controls {
    max-width: 420px;
    margin: 20px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .nav-btn {
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 24px;
    border: none;
    background: var(--teal-deep);
    color: white;
    cursor: pointer;
    flex: 1;
  }

  .nav-btn:active {
    background: var(--teal-mid);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .counter {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--teal-deep);
    min-width: 50px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Daily English</div>
  <h1>Günlük Kartlar</h1>
  <p>Karta dokun, çevir. Basit kelimeler ve cümleler.</p>
</div>

<div class="overall-wrap">
  <div class="overall-progress" id="overallProgress">Toplam: 0/100 kelime öğrenildi (%0)</div>
  <div class="overall-bar"><div class="overall-bar-fill" id="overallBarFill"></div></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="tabs-hint">← kategoriler arasında kaydır →</div>

<div class="toolbar">
  <button class="tool-btn" id="shuffleBtn">🔀 Karıştır</button>
  <button class="tool-btn" id="filterBtn">🔎 Sadece öğrenilmeyenler</button>
</div>

<div class="progress" id="progress"></div>

<div class="deck" id="deck"></div>

<div class="controls">
  <button class="nav-btn" id="prevBtn">← Önceki</button>
  <span class="counter" id="counter"></span>
  <button class="nav-btn" id="nextBtn">Sonraki →</button>
</div>

<script src="kartlar.js"></script>

</body>
</html>
