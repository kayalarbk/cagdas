<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="İlgi alanlarına göre günlük İngilizce kelime çalış. Seri yap, hedefini tuttur.">
<meta name="theme-color" content="#0F1B2D">
<title>Daily English — İlgi alanına göre İngilizce</title>
<link rel="stylesheet" href="src/styles/main.css">
</head>
<body>

<!-- ============ ÜST BAR ============ -->
<header class="top-bar hidden" id="topBar">
  <button class="top-bar-back" id="backBtn" aria-label="Geri">←</button>
  <div class="top-bar-brand">Daily<span>English</span></div>
  <div class="top-bar-stats">
    <span class="stat-chip stat-chip--streak" id="streakChip" title="Günlük seri">
      <span class="stat-chip-icon">🔥</span><span id="streakValue">0</span>
    </span>
    <span class="stat-chip stat-chip--xp" id="xpChip" title="Toplam puan">
      <span class="stat-chip-icon">⭐</span><span id="xpValue">0</span>
    </span>
  </div>
</header>

<main>

<!-- ============ EKRAN 1: İLGİ ALANI SEÇİMİ ============ -->
<section id="onboarding-screen" class="screen hidden">
  <div class="onboarding-intro">
    <div class="wizard-steps" id="wizardSteps"></div>
    <div class="onboarding-badge">Daily English</div>
    <h1 class="onboarding-title" id="wizardTitle">Seni tanıyalım</h1>
    <p class="onboarding-sub" id="wizardSub">
      Birkaç soruyla sana uygun kelimeleri seçelim.
    </p>
  </div>

  <div class="option-list" id="wizardOptions"></div>
  <div class="field-grid hidden" id="interestGrid"></div>

  <div class="onboarding-footer">
    <p class="onboarding-count" id="interestCount"></p>
    <div class="onboarding-actions">
      <button class="btn btn-ghost hidden" id="wizardBackBtn">← Geri</button>
      <button class="btn btn-primary btn-block" id="interestSaveBtn">Devam</button>
    </div>
  </div>
</section>

<!-- ============ EKRAN 2: ANASAYFA (PANO) ============ -->
<section id="home-screen" class="screen hidden">
  <div class="greeting">
    <h1 id="greetingTitle">Merhaba</h1>
    <p id="greetingSub">Bugün birkaç kelime öğrenmeye ne dersin?</p>
    <button class="profile-chip hidden" id="profileChip" title="Testi yeniden çöz"></button>
  </div>

  <!-- Günlük hedef kartı -->
  <div class="goal-card">
    <div class="goal-ring">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <circle class="goal-ring-track" cx="60" cy="60" r="52"></circle>
        <circle class="goal-ring-fill" cx="60" cy="60" r="52" id="goalRingFill"></circle>
      </svg>
      <div class="goal-ring-label">
        <span class="goal-ring-value" id="goalCount">0</span>
        <span class="goal-ring-total" id="goalTotal">/ 10</span>
      </div>
    </div>
    <div class="goal-info">
      <div class="goal-title">Günlük hedef</div>
      <p class="goal-text" id="goalText">Bugün 10 kelime öğren.</p>
      <div class="goal-actions">
        <label class="goal-select-label" for="goalSelect">Hedef</label>
        <select class="goal-select" id="goalSelect">
          <option value="5">5 kelime</option>
          <option value="10">10 kelime</option>
          <option value="20">20 kelime</option>
          <option value="30">30 kelime</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn btn-primary btn-block btn-lg" id="continueBtn">Bugüne Başla</button>

  <!-- Seçili alanlar -->
  <div class="section-head">
    <h2>Alanların</h2>
    <button class="link-btn" id="editInterestsBtn">Alan ekle / çıkar</button>
  </div>
  <div class="field-list" id="homeFieldList"></div>

  <!-- Keşfedilmemiş alanlar -->
  <div class="section-head hidden" id="exploreHead">
    <h2>Keşfet</h2>
    <span class="section-note">dokun ve ekle</span>
  </div>
  <div class="field-list field-list--muted" id="exploreFieldList"></div>
</section>

<!-- ============ EKRAN 3: ALAN DETAYI (KATEGORİLER) ============ -->
<section id="field-screen" class="screen hidden">
  <div class="field-hero" id="fieldHero">
    <div class="field-hero-icon" id="fieldHeroIcon">🌅</div>
    <h1 class="field-hero-name" id="fieldHeroName">Alan</h1>
    <p class="field-hero-desc" id="fieldHeroDesc"></p>
    <div class="field-hero-bar">
      <div class="progress-track"><div class="progress-fill" id="fieldHeroFill"></div></div>
      <div class="field-hero-stat" id="fieldHeroStat">0/0 öğrenildi</div>
    </div>
    <div class="field-hero-levels hidden" id="fieldLevels" aria-label="Seviye dağılımı"></div>
  </div>

  <div class="category-list" id="categoryList"></div>
</section>

<!-- ============ EKRAN 4: KARTLAR ============ -->
<section id="cards-screen" class="screen hidden">
  <div class="cards-head">
    <div class="cards-title" id="cardsTitle"></div>
    <div class="cards-toolbar">
      <button class="chip" id="shuffleBtn">🔀 Karıştır</button>
      <button class="chip" id="filterBtn">Sadece öğrenilmeyenler</button>
      <button class="chip chip--accent" id="quizBtn">🎯 Quiz</button>
    </div>
    <div class="level-filter hidden" id="levelFilter" role="group" aria-label="Seviye filtresi"></div>
  </div>

  <div class="deck-progress">
    <div class="progress-track"><div class="progress-fill" id="deckFill"></div></div>
    <span class="deck-counter" id="counter"></span>
  </div>

  <div class="deck" id="deck"></div>

  <div class="deck-controls">
    <button class="btn btn-ghost" id="prevBtn">← Önceki</button>
    <button class="btn btn-ghost" id="nextBtn">Sonraki →</button>
  </div>
</section>

<!-- ============ EKRAN 5: QUIZ ============ -->
<section id="quiz-screen" class="screen hidden">
  <div id="quiz-question-area">
    <div class="quiz-progress">
      <div class="progress-track"><div class="progress-fill" id="quizFill"></div></div>
      <span class="quiz-counter" id="quizProgress"></span>
    </div>

    <div class="quiz-card">
      <div class="quiz-sentence" id="quizSentence"></div>
      <div class="quiz-hint hidden" id="quizHint"></div>
    </div>

    <div class="quiz-options" id="quizOptions"></div>

    <div class="quiz-footer">
      <button class="btn btn-primary btn-block hidden" id="quizNextBtn">Devam</button>
    </div>
  </div>

  <div id="quiz-result-area" class="hidden">
    <div class="result-card">
      <div class="result-emoji" id="quizResultEmoji">🎉</div>
      <div class="result-title" id="quizResultTitle"></div>
      <div class="result-text" id="quizResultText"></div>
      <div class="result-xp" id="quizResultXp"></div>
      <div class="result-mistakes hidden" id="quizMistakes"></div>
      <div class="result-actions">
        <button class="btn btn-ghost" id="quizRetryBtn">Tekrar Dene</button>
        <button class="btn btn-primary" id="quizBackBtn">Bitir</button>
      </div>
    </div>
  </div>
</section>

</main>

<!-- Kısa bildirimler (XP, seri, hedef) -->
<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<script type="module" src="src/js/main.js"></script>

</body>
</html>
